version: "3.8"
services:
  web:
    build: .
    container_name: sdc-web
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
         db:
            condition: service_healthy
    env_file:
      - .env
    command: sh -c "sleep 10 && npx prisma db push && npx prisma generate && node index.js"
    ports:
      - "0.0.0.0:3999:3000"
      - "5555:5555"
  db:
    image: mysql:8.0
    container_name: db
    environment:
      MYSQL_ROOT_PASSWORD: arthur2205
      MYSQL_USER: app
      MYSQL_PASSWORD: molly2205
      MYSQL_DATABASE: sistemaweb
        - DATABASE_URL=mysql://root:arthur2205@db:3306/sistemaweb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -parthur2205 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
      
volumes:
  mysql_data:

   